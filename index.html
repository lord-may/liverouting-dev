<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.29/"></script>

    <!-- TODO: Make this not so ugly -->
    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 80px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.92);
        padding: 6px 10px;
        border-radius: 6px;
      }
      #ui button {

        margin-left: 12px;
      }

        padding: 8px 20px;
        border-radius: 20px;
        font-size: 14px;

  </head>

        <button id="btnShowRoutes">Show routes</button>
        <button id="btnShowFlow">Show flow</button>
      </div>
      <div
        id="routesDisabledMsg"
        style="display: none; font-size: 11px; color: #888; margin-top: 3px"
      >
        Routes disabled (&gt;1,000 origins) — use Show flow

    <script src="./resources/db-data.js"></script>
    <script src="./resources/firehalls-data.js"></script>
    <script src="./resources/config.js"></script>

    <script src="./resources/app-enc.js"></script>
